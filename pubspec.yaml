name: endoscopy_tool
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  video_player: ^2.7.0
  window_size: ^0.1.0
  google_fonts: ^6.2.1
  file_picker: ^10.1.9
  image_picker: ^1.0.4
  flutter_webrtc: ^0.14.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/videos/kruzhka.mp4
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Medium.ttf
          weight: 400
